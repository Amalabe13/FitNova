<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fitNova</title>
    <link rel="icon" type="image/png" href="pic/app.png">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div id="login">

        <div id="head">
            <h2>Login</h2>
        </div>

        <div id="image">
            <form>
                <label for="profilePic">Upload Profile Photo</label>
                <input type="file" id="profilePic" accept="image/*">
            </form>
        </div>

        <div id="form" >
            <form>
                <input name="username" type="text" placeholder="Username" id="un" required>
                <input name="password" type="password" placeholder="Password" id="pw" required>
                <button type="button" onclick="saveData()">Login</button>
            </form>
        </div>

    </div>
    <script src="login.js"></script>
</body>
</html>
