<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker</title>
    <link rel="stylesheet" href="calorie.css">
</head>

<body>
    <div id="outer">
        <div style="display:flex;gap:20px;align-items:center;padding:20px 5px;margin:20px;">
            <img id="icon" src="pic/icon.svg">
            <h3 id="cname" style="color:#ffffff;">Name</h3>
        </div>
        <a href="home.html">
            <div class="box" >
                <img src="pic/home.svg">
                <span>Dashboard</span>
            </div>
        </a>
        <a href="water.html">
            <div class="box">
                <img src="pic/water.svg">
                <span>Water Tracker</span>
            </div>
        </a>
        <a href="calorie.html">
            <div class="box-active">
                <img src="pic/calorie.svg">
                <span>Calorie Tracker</span>
            </div>
        </a>
        <a href="exercise.html">
            <div class="box">
                <img src="pic/exercise.svg">
                <span>Exercise Tracker</span>
            </div>
        </a>
        <a href="nutrition.html">
            <div class="box">
                <img src="pic/nutrition.svg">
                <span>Nutrition Tracker</span>
            </div>
        </a>
        <a href="progress.html">
            <div class="box">
                <img src="pic/progress.svg">
                <span>Progress Tracker</span>
            </div>
        </a>
    </div>

    <div class="page">
        <div class="section-title">
        <span class="line"></span>
        <h2>Calorie Tracker</h2>
        </div>
        <div class="input-section">
            <input type="text" id="food" placeholder="Food item">
            <input type="number" id="calories" placeholder="Calories">
            <button onclick="addItem()">Add</button>
        </div>

        <table class="list-table" id="calorieTable">
    <caption>Daily Calorie Intake</caption>

    <thead>
        <tr>
            <th scope="col">Food Item</th>
            <th scope="col">Calories (kcal)</th>
            <th scope="col">Action</th>
        </tr>
    </thead>

    <tbody id="calorieBody">
        <!-- JS will insert rows here -->
    </tbody>

    <tfoot>
        <tr>
            <td colspan="2"><strong>Total</strong></td>
            <td id="totalCalories"><strong>0 kcal</strong></td>
        </tr>
    </tfoot>
</table>

        <div class="total" id="total">
            Total: 0 kcal
        </div>

        <div class="section-title" style="padding-bottom:10px;">
            <span class="line"></span>
            <h3>Calorie Suggestion</h3>
        </div>

        <div class="suggest-box">
            <input type="number" id="weight" placeholder="Enter weight (kg)">
            <select id="activity">
                <option value="25">Light activity</option>
                <option value="30">Moderate activity</option>
                <option value="35">Active</option>
            </select>
            <select id="goalType">
                <option value="lose">Lose weight</option>
                <option value="maintain">Maintain</option>
                <option value="gain">Gain weight</option>
            </select>
            <button onclick="suggestCalories()" id="sug">Suggest</button>
            <p id="suggest-result"></p>
        </div>

        <div class="section-title" style="padding-top:20px;">
            <span class="line"></span>
            <h3>Set your goal</h3>
        </div>

        <div class="goal-b">
        <div class="goal-box">
            <div class="goal-input" id="manualGoalBox">
                <input type="number" id="goalInput" placeholder="Set daily goal (kcal)">
                <button onclick="setGoal()">Set Goal</button>
            </div>

            <div style="display:flex;gap:10px;flex-direction:column;padding-left:10px;">
                <i><p id="auto-msg">Auto goal applied based on your weight</p></i>
                <button id="editBtn" style="display:none;width:100px;" onclick="enableManualGoal()">Edit Goal</button>
            </div>

            <div class="goal-text">
                <span id="goalText">Daily Goal: 1200 kcal</span>
                <span id="percent">0%</span> 
            </div>

            <div class="progress-bar">
                <div class="progress" id="progress"></div>
            </div>

            <i><p id="goal-msg" class="goal-msg" style="padding-left: 10px;margin-top:0;"></p></i>
        </div>
        </div>
    </div>

    <script src="calorie.js"></script>
</body>

</html>
