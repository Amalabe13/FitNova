<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fitNova-Contact</title>
    <link rel="icon" type="image/png" href="pic/app.png">
    <link id="theme-css" rel="stylesheet" href="contact.css">
    <style>
        *{
            margin:0;
            padding:0;
        }
    </style>
</head>

<body>
    <header class="top-strip" >

    <div class="brand">
        <img src="pic/app.png" alt="">
        <span>FIT<span style="color:#e66a00">NOVA</span></span>
    </div>

    <nav class="menu">
        <a href="home.html"><img src="pic/home.svg"></a>
        <a href="about.html">About</a>
        <a href="faq.html">FAQ</a>
        <a href="feedback.html">Feedback</a>
        <button onclick="logout()">Logout</button>
    </nav>

    </header>

    <main style="padding:30px;">
    

    <section class="page">
        <div class="section-title">
            <span class="line"></span>
            <h2>Contact Us</h2>
        </div>
        <article class="contact-box">
            <p class="contact-desc">
                Have questions or need assistance? We're here to help!
            </p>

            <form id="contactForm">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="email" id="email" placeholder="Your Email" required>
                <textarea id="message" placeholder="Your Message" rows="5" required></textarea>
                <button type="submit">Send Message</button>
            </form>

            <p id="contact-msg" class="success-msg"></p>
        </article>
    </section>
    </main>
    <script src="contact.js"></script>
</body>
</html>
