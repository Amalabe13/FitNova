<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fitNova</title>
    <link rel="icon" type="image/png" href="pic/app.png">
    <link rel="stylesheet" href="side.css">
    <link rel="stylesheet" href="faq.css">
</head>

<body>
    <header class="top-strip" >

    <div class="brand">
        <img src="pic/app.png" alt="">
        <span>FIT<span style="color:#e66a00">NOVA</span></span>
    </div>

    <nav class="menu">
        <a href="home.html"><img src="pic/home.svg"></a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <button onclick="logout()">Logout</button>
    </nav>

    </header>
    <main style="padding-top:50px;">
    <div class="page">
        <div class="section-title">
            <span class="line"></span>
            <h2>FAQs</h2>
        </div>

        <div class="faq-container">

            <div class="faq-item">
                <button class="faq-question">
                    How do I track calories?
                    <span class="icon">+</span>
                </button>
                <div class="faq-answer">
                    <p>You can add food items in the calorie tracker section...</p>
                </div>
            </div>

            <div class="faq-item">
                <button class="faq-question">
                    Does data persist after refresh?
                    <span class="icon">+</span>
                </button>
                <div class="faq-answer">
                    <p>Yes, we use localStorage to save your data...</p>
                </div>
            </div>

            <div class="faq-item">
                <button class="faq-question">
                    Can I set goals?
                    <span class="icon">+</span>
                </button>
                <div class="faq-answer">
                    <p>Yes, you can set calorie and burn goals and track progress using the progress bar.</p>
                </div>
            </div>

             <div class="faq-item">
                <button class="faq-question">
                    Can I edit or delete entries?
                    <span class="icon">+</span>
                </button>
                <div class="faq-answer">
                    <p>Yes, you can edit or delete entries in the calorie tracker...</p>
                </div>
            </div>

        </div>
    </div>
    </main>
    <script src="faq.js"></script>
</body>

</html>
